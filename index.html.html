<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="سوم AI">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <title>سَوم AI — إدراج إعلان في 30 ثانية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sawm-purple': {
                            50: '#f5f0ff',
                            100: '#ede5ff',
                            200: '#ddd0ff',
                            300: '#c4abff',
                            400: '#a67dff',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        },
                        'sawm-emerald': {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                        }
                    },
                    fontFamily: {
                        'tajawal': ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background: #f8f9fa; }

        /* Smooth animations */
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(139, 92, 246, 0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes checkmark {
            0% { stroke-dashoffset: 50; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1) rotate(180deg); }
        }
        @keyframes progressFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.15); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes slideUpSheet {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-slideUp { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        .animate-scaleIn { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-bounceIn { animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }

        .shimmer-bg {
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .progress-gradient {
            background: linear-gradient(90deg, #8b5cf6, #a78bfa, #7c3aed, #8b5cf6);
            background-size: 200% 100%;
            animation: progressFlow 2s linear infinite;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 0; }

        /* Status bar notch simulation */
        .notch {
            width: 120px;
            height: 28px;
            background: #000;
            border-radius: 0 0 18px 18px;
            margin: 0 auto;
        }

        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .card-shadow {
            box-shadow: 0 4px 24px -4px rgba(139, 92, 246, 0.12), 0 0 0 1px rgba(139, 92, 246, 0.05);
        }

        .btn-shadow {
            box-shadow: 0 8px 32px -8px rgba(139, 92, 246, 0.5);
        }

        .sheet-overlay {
            animation: fadeInOverlay 0.3s ease-out forwards;
        }
        .sheet-content {
            animation: slideUpSheet 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Custom range slider */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(to left, #8b5cf6, #ddd0ff);
            outline: none;
            direction: ltr;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: white;
            border: 3px solid #8b5cf6;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        /* Prevent text selection on buttons */
        button, .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-gradient-to-br from-gray-50 via-white to-sawm-purple-50/30">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        /* ───────────── ICONS (inline SVG) ───────────── */
        const CameraIcon = ({ size = 48, color = "white" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        );

        const SparkleIcon = ({ size = 20, color = "#8b5cf6" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={color}>
                <path d="M12 0L14.59 8.41L23 11L14.59 13.59L12 22L9.41 13.59L1 11L9.41 8.41L12 0Z"/>
            </svg>
        );

        const CheckIcon = ({ size = 24, color = "white" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" style={{ strokeDasharray: 50, strokeDashoffset: 0, animation: 'checkmark 0.4s ease-out forwards' }}/>
            </svg>
        );

        const AIChipIcon = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <rect x="4" y="4" width="16" height="16" rx="2"/>
                <rect x="9" y="9" width="6" height="6" rx="1"/>
                <line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/>
                <line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/>
                <line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/>
                <line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/>
            </svg>
        );

        const ShieldIcon = ({ size = 16 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <polyline points="9 12 11 14 15 10"/>
            </svg>
        );

        const ImageIcon = ({ size = 32, color = "#a78bfa" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
        );

        const TagIcon = ({ size = 16, color = "#8b5cf6" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
        );

        const RocketIcon = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
                <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
                <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
                <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
            </svg>
        );

        const EditIcon = ({ size = 16, color = "#8b5cf6" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
        );

        const CloseIcon = ({ size = 20, color = "#6b7280" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        );

        const MinusIcon = ({ size = 18, color = "#8b5cf6" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        );

        const PlusIcon = ({ size = 18, color = "#8b5cf6" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        );

        /* ───────────── EDIT BOTTOM SHEET ───────────── */
        const EditSheet = ({ mode, product, onSave, onClose }) => {
            // mode: 'price' or 'condition'
            const [price, setPrice] = useState(product.price);
            const [condition, setCondition] = useState(product.conditionKey);

            const conditions = [
                { key: 'new', label: 'جديد بالكرتون', icon: '🆕', score: 100, desc: 'ما انفتح أبداً' },
                { key: 'excellent', label: 'ممتازة — مثل الجديد', icon: '✨', score: 95, desc: 'استخدام خفيف بدون أي أثر' },
                { key: 'good', label: 'جيدة جداً', icon: '👍', score: 80, desc: 'خدوش بسيطة ما تنلاحظ' },
                { key: 'fair', label: 'مقبولة', icon: '📦', score: 60, desc: 'آثار استخدام واضحة' },
            ];

            const formatPrice = (p) => {
                return new Intl.NumberFormat('ar-SA').format(p);
            };

            const low = product.priceLow || 3500;
            const high = product.priceHigh || 4200;
            const sliderMin = Math.max(100, Math.round(low * 0.5));
            const sliderMax = Math.round(high * 1.5);
            const getPriceHint = (p) => {
                if (p < low) return { text: 'أقل من السوق — بينباع بسرعة! 🔥', color: 'text-sawm-emerald-600' };
                if (p <= high) return { text: 'ضمن نطاق السوق — سعر عادل 👌', color: 'text-sawm-purple-600' };
                return { text: 'أعلى من السوق — ممكن ياخذ وقت ⏳', color: 'text-amber-600' };
            };

            const hint = getPriceHint(price);

            return (
                <div className="absolute inset-0 z-50 flex flex-col justify-end sheet-overlay" style={{ background: 'rgba(0,0,0,0.4)' }} onClick={onClose}>
                    <div className="bg-white rounded-t-3xl sheet-content" onClick={e => e.stopPropagation()}>
                        {/* Handle */}
                        <div className="flex justify-center pt-3 pb-1">
                            <div className="w-10 h-1 bg-gray-200 rounded-full"></div>
                        </div>

                        {/* Header */}
                        <div className="flex items-center justify-between px-6 py-3">
                            <h3 className="text-lg font-bold text-gray-900">
                                {mode === 'price' ? 'عدّل السعر' : 'عدّل الحالة'}
                            </h3>
                            <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors">
                                <CloseIcon size={16} />
                            </button>
                        </div>

                        {mode === 'price' ? (
                            <div className="px-6 pb-8">
                                {/* Current price display */}
                                <div className="text-center mb-6">
                                    <div className="inline-flex items-center gap-2 bg-sawm-purple-50 rounded-2xl px-6 py-4">
                                        <span className="text-3xl font-bold text-sawm-purple-700">{formatPrice(price)}</span>
                                        <span className="text-sm text-sawm-purple-400 font-medium">ر.س</span>
                                    </div>
                                </div>

                                {/* +/- buttons with slider */}
                                <div className="flex items-center gap-3 mb-4">
                                    <button
                                        onClick={() => setPrice(Math.max(sliderMin, price - 50))}
                                        className="w-10 h-10 rounded-xl bg-sawm-purple-50 flex items-center justify-center hover:bg-sawm-purple-100 active:scale-95 transition-all"
                                    >
                                        <MinusIcon />
                                    </button>
                                    <input
                                        type="range"
                                        min={sliderMin}
                                        max={sliderMax}
                                        step="50"
                                        value={price}
                                        onChange={e => setPrice(Number(e.target.value))}
                                        className="flex-1"
                                    />
                                    <button
                                        onClick={() => setPrice(Math.min(sliderMax, price + 50))}
                                        className="w-10 h-10 rounded-xl bg-sawm-purple-50 flex items-center justify-center hover:bg-sawm-purple-100 active:scale-95 transition-all"
                                    >
                                        <PlusIcon />
                                    </button>
                                </div>

                                {/* Market range labels */}
                                <div className="flex justify-between text-[10px] text-gray-400 mb-4 px-12">
                                    <span>{formatPrice(sliderMin)} ر.س</span>
                                    <span>{formatPrice(sliderMax)} ر.س</span>
                                </div>

                                {/* Smart hint */}
                                <div className="bg-gray-50 rounded-2xl p-3 mb-6">
                                    <div className="flex items-center gap-2">
                                        <AIChipIcon size={16} />
                                        <span className={`text-xs font-medium ${hint.color}`}>{hint.text}</span>
                                    </div>
                                    <div className="flex items-center justify-between mt-2 text-[10px] text-gray-400">
                                        <span>نطاق السوق: {new Intl.NumberFormat('ar-SA').format(low)} - {new Intl.NumberFormat('ar-SA').format(high)} ر.س</span>
                                        <span>اقتراح سَوم: {new Intl.NumberFormat('ar-SA').format(product.price)} ر.س</span>
                                    </div>
                                </div>

                                {/* Save button */}
                                <button
                                    onClick={() => onSave({ price })}
                                    className="w-full py-3.5 rounded-2xl bg-gradient-to-l from-sawm-purple-600 to-sawm-purple-500 text-white font-bold text-sm btn-shadow hover:brightness-110 active:scale-[0.98] transition-all"
                                >
                                    تأكيد السعر
                                </button>
                            </div>
                        ) : (
                            <div className="px-6 pb-8">
                                {/* Condition options */}
                                <div className="space-y-2 mb-6">
                                    {conditions.map(c => (
                                        <button
                                            key={c.key}
                                            onClick={() => setCondition(c.key)}
                                            className={`
                                                w-full flex items-center gap-3 p-3.5 rounded-2xl text-right transition-all duration-200
                                                ${condition === c.key
                                                    ? 'bg-sawm-purple-50 border-2 border-sawm-purple-400 scale-[1.01]'
                                                    : 'bg-gray-50 border-2 border-transparent hover:bg-gray-100'
                                                }
                                            `}
                                        >
                                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0 ${
                                                condition === c.key ? 'bg-sawm-purple-100' : 'bg-white'
                                            }`}>
                                                {c.icon}
                                            </div>
                                            <div className="flex-1">
                                                <div className="flex items-center justify-between">
                                                    <span className={`text-sm font-bold ${condition === c.key ? 'text-sawm-purple-700' : 'text-gray-700'}`}>{c.label}</span>
                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${
                                                        condition === c.key ? 'bg-sawm-purple-200 text-sawm-purple-700' : 'bg-gray-200 text-gray-500'
                                                    }`}>{c.score}%</span>
                                                </div>
                                                <span className="text-[11px] text-gray-400">{c.desc}</span>
                                            </div>
                                            {condition === c.key && (
                                                <div className="w-5 h-5 rounded-full bg-sawm-purple-500 flex items-center justify-center flex-shrink-0">
                                                    <CheckIcon size={12} />
                                                </div>
                                            )}
                                        </button>
                                    ))}
                                </div>

                                {/* Save button */}
                                <button
                                    onClick={() => {
                                        const sel = conditions.find(c => c.key === condition);
                                        onSave({ conditionKey: condition, conditionLabel: sel.label, conditionScore: sel.score });
                                    }}
                                    className="w-full py-3.5 rounded-2xl bg-gradient-to-l from-sawm-purple-600 to-sawm-purple-500 text-white font-bold text-sm btn-shadow hover:brightness-110 active:scale-[0.98] transition-all"
                                >
                                    تأكيد الحالة
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        /* ───────────── Floating Sparkles Decoration ───────────── */
        const FloatingSparkles = () => (
            <div className="absolute inset-0 pointer-events-none overflow-hidden">
                {[...Array(5)].map((_, i) => (
                    <div key={i} className="absolute" style={{
                        top: `${15 + i * 18}%`,
                        left: i % 2 === 0 ? `${5 + i * 3}%` : `${80 - i * 3}%`,
                        animation: `sparkle ${2 + i * 0.5}s ease-in-out ${i * 0.4}s infinite`,
                        opacity: 0,
                    }}>
                        <SparkleIcon size={8 + i * 2} color={i % 2 === 0 ? '#c4abff' : '#a7f3d0'} />
                    </div>
                ))}
            </div>
        );

        const GalleryIcon = ({ size = 24, color = "white" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
        );

        /* ───────────── SOURCE PICKER ACTION SHEET ───────────── */
        const SourcePicker = ({ onSelect, onClose }) => (
            <div className="absolute inset-0 z-50 flex flex-col justify-end sheet-overlay" style={{ background: 'rgba(0,0,0,0.4)' }} onClick={onClose}>
                <div className="bg-white rounded-t-3xl sheet-content px-6 pb-8" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-center pt-3 pb-1 mb-2">
                        <div className="w-10 h-1 bg-gray-200 rounded-full"></div>
                    </div>
                    <h3 className="text-lg font-bold text-gray-900 text-center mb-1">وش تبي تسوّي؟</h3>
                    <p className="text-xs text-gray-400 text-center mb-5">اختر طريقة رفع صورة المنتج</p>
                    <div className="grid grid-cols-2 gap-3">
                        <button onClick={() => onSelect('camera')} className="flex flex-col items-center gap-3 p-5 rounded-2xl bg-gradient-to-br from-sawm-purple-500 to-sawm-purple-700 text-white active:scale-95 transition-all btn-shadow">
                            <div className="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center">
                                <CameraIcon size={30} color="white" />
                            </div>
                            <span className="font-bold text-sm">فتح الكاميرا</span>
                            <span className="text-[10px] text-white/70">صوّر المنتج مباشرة</span>
                        </button>
                        <button onClick={() => onSelect('gallery')} className="flex flex-col items-center gap-3 p-5 rounded-2xl bg-gradient-to-br from-sawm-emerald-500 to-sawm-emerald-700 text-white active:scale-95 transition-all" style={{ boxShadow: '0 8px 32px -8px rgba(16, 185, 129, 0.5)' }}>
                            <div className="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center">
                                <GalleryIcon size={30} color="white" />
                            </div>
                            <span className="font-bold text-sm">الاستوديو</span>
                            <span className="text-[10px] text-white/70">اختر من الصور</span>
                        </button>
                    </div>
                    <button onClick={onClose} className="w-full mt-3 py-3 rounded-2xl bg-gray-100 text-gray-500 font-medium text-sm hover:bg-gray-200 active:scale-[0.98] transition-all">
                        إلغاء
                    </button>
                </div>
            </div>
        );

        /* ───────────── STEP 1: Camera / Capture ───────────── */
        const PHOTO_LABELS = ['الأمامية', 'الخلفية', 'الجوانب'];

        const CaptureStep = ({ onCapture, initialPhotos, photoValidation }) => {
            // photoValidation: { statuses: ['valid','valid','error'], failedIndex: 1, errorMessage: '...', errorType: '...' } | null
            const [photos, setPhotos] = useState(initialPhotos || [null, null, null]);
            const [isPressed, setIsPressed] = useState(false);
            const [showPicker, setShowPicker] = useState(false);
            const [reshootIndex, setReshootIndex] = useState(null); // which photo slot to reshoot
            const cameraRef = useRef(null);
            const galleryRef = useRef(null);

            // Sync with initialPhotos when they change (e.g. returning from validation)
            useEffect(() => {
                if (initialPhotos && initialPhotos.some(Boolean)) {
                    setPhotos(initialPhotos);
                }
            }, [initialPhotos]);

            const filledCount = photos.filter(Boolean).length;
            const allFilled = filledCount === 3;
            const hasValidation = photoValidation && photoValidation.statuses;
            const isPartialReshoot = hasValidation && photoValidation.statuses.includes('error');
            const nextSlot = isPartialReshoot
                ? photoValidation.statuses.indexOf('error')
                : photos.findIndex(p => p === null); // next empty slot

            const handleSourceSelect = (source) => {
                setShowPicker(false);
                if (source === 'camera') {
                    cameraRef.current.click();
                } else {
                    galleryRef.current.click();
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const base64 = ev.target.result;
                    userChangedPhotos.current = true; // User actively added/changed a photo
                    setPhotos(prev => {
                        const updated = [...prev];
                        if (reshootIndex !== null) {
                            // Replacing a specific failed photo
                            updated[reshootIndex] = base64;
                        } else {
                            const idx = prev.findIndex(p => p === null);
                            if (idx !== -1) updated[idx] = base64;
                        }
                        return updated;
                    });
                    setReshootIndex(null);
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            };

            // Handle reshoot of a specific photo
            const handleReshootPhoto = (index) => {
                setReshootIndex(index);
                setShowPicker(true);
            };

            // Track if photos were changed by user (not just loaded from initialPhotos)
            const userChangedPhotos = useRef(false);

            // Auto-submit when 3 photos are done (and either no validation or after reshoot)
            useEffect(() => {
                if (photos.every(Boolean)) {
                    // If we're in partial reshoot mode and a failed photo was just replaced
                    if (isPartialReshoot) {
                        const failedIdx = photoValidation.statuses.indexOf('error');
                        // Check if the failed slot now has a different photo (was replaced)
                        if (initialPhotos && photos[failedIdx] !== initialPhotos[failedIdx]) {
                            const timer = setTimeout(() => onCapture(photos), 600);
                            return () => clearTimeout(timer);
                        }
                        return; // Don't auto-submit if failed photo hasn't been replaced yet
                    }
                    // Don't auto-submit if photos came pre-filled from initialPhotos (prevents loop)
                    if (!userChangedPhotos.current && initialPhotos && initialPhotos.every(Boolean)) {
                        return;
                    }
                    const timer = setTimeout(() => onCapture(photos), 600);
                    return () => clearTimeout(timer);
                }
            }, [photos]);

            const headingTexts = [
                'وش بتبيع اليوم؟ 📸',
                'حلو! الحين صوّر الخلف 🔄',
                'آخر وحدة! صوّر الجنب 📐',
            ];
            const subTexts = [
                'صوّر الشاشة الأمامية',
                'خلنا نشوف الظهر والكاميرا',
                'الأطراف والمنافذ — وخلصنا!',
            ];

            // Partial reshoot heading
            const reshootHeading = isPartialReshoot ? 'صوّر الصورة المطلوبة مرة ثانية 🔄' : null;
            const reshootSub = isPartialReshoot ? photoValidation.errorMessage : null;

            return (
                <div className="flex flex-col items-center justify-center flex-1 px-6 animate-fadeIn relative">
                    {/* Hidden file inputs */}
                    <input type="file" accept="image/*" capture="environment" ref={cameraRef} onChange={handleFileChange} style={{ display: 'none' }} />
                    <input type="file" accept="image/*" ref={galleryRef} onChange={handleFileChange} style={{ display: 'none' }} />

                    {/* Header */}
                    <div className="text-center mb-6 animate-slideUp">
                        <div className="inline-flex items-center gap-2 bg-sawm-purple-50 rounded-full px-4 py-1.5 mb-4">
                            <AIChipIcon size={16} />
                            <span className="text-sawm-purple-600 text-xs font-medium">مدعوم بالذكاء الاصطناعي</span>
                        </div>
                        <h2 className="text-2xl font-bold text-gray-900 mb-2" key={filledCount}>
                            {allFilled && !isPartialReshoot ? 'تمام! جاري التحليل... ✨' : reshootHeading || headingTexts[nextSlot >= 0 ? nextSlot : 0]}
                        </h2>
                        <p className={`text-sm leading-relaxed ${isPartialReshoot ? 'text-red-500' : 'text-gray-400'}`}>
                            {allFilled && !isPartialReshoot ? 'سَوم يشتغل الحين' : reshootSub || subTexts[nextSlot >= 0 ? nextSlot : 0]}
                        </p>
                    </div>

                    {/* Camera button */}
                    <div className="relative mb-6">
                        <div className="absolute inset-0 -m-4 rounded-full border-2 border-dashed border-sawm-purple-200/50 animate-spin" style={{ animationDuration: '20s' }}></div>
                        <div className="absolute inset-0 -m-8 rounded-full border border-dashed border-sawm-purple-100/40 animate-spin" style={{ animationDuration: '30s', animationDirection: 'reverse' }}></div>

                        <button
                            onClick={() => {
                                if (isPartialReshoot) {
                                    const failedIdx = photoValidation.statuses.indexOf('error');
                                    handleReshootPhoto(failedIdx);
                                } else if (!allFilled) {
                                    setShowPicker(true);
                                }
                            }}
                            onMouseDown={() => setIsPressed(true)}
                            onMouseUp={() => setIsPressed(false)}
                            onMouseLeave={() => setIsPressed(false)}
                            disabled={allFilled && !isPartialReshoot}
                            className={`
                                relative w-36 h-36 rounded-full
                                ${isPartialReshoot
                                    ? 'bg-gradient-to-br from-red-400 via-red-500 to-red-600'
                                    : 'bg-gradient-to-br from-sawm-purple-500 via-sawm-purple-600 to-sawm-purple-700'}
                                flex items-center justify-center
                                transition-all duration-200 ease-out
                                ${allFilled && !isPartialReshoot ? '' : 'pulse-glow cursor-pointer'}
                                ${isPressed ? 'scale-90' : allFilled && !isPartialReshoot ? 'scale-100' : 'hover:scale-105'}
                            `}
                        >
                            {allFilled && !isPartialReshoot ? (
                                <div className="absolute inset-1 rounded-full bg-sawm-emerald-500 flex items-center justify-center">
                                    <CheckIcon size={48} color="white" />
                                </div>
                            ) : isPartialReshoot ? (
                                <div className="absolute inset-1 rounded-full bg-gradient-to-br from-red-300 to-red-500 flex items-center justify-center">
                                    <CameraIcon size={44} />
                                </div>
                            ) : (
                                <div className="absolute inset-1 rounded-full bg-gradient-to-br from-sawm-purple-400 to-sawm-purple-600 flex items-center justify-center">
                                    <CameraIcon size={44} />
                                </div>
                            )}
                        </button>
                    </div>

                    {/* Label */}
                    <p className={`font-semibold text-base mb-1 ${
                        isPartialReshoot ? 'text-red-500 animate-float' :
                        allFilled ? 'text-sawm-emerald-600' : 'text-sawm-purple-600 animate-float'
                    }`}>
                        {isPartialReshoot ? 'إعادة تصوير' : allFilled ? 'اكتملت الصور!' : 'تصوير المنتج'}
                    </p>
                    <p className="text-gray-400 text-xs mb-5">
                        {isPartialReshoot ? `الصورة ${nextSlot + 1} تحتاج إعادة تصوير` : allFilled ? '' : `الصورة ${nextSlot + 1} من ٣`}
                    </p>

                    {/* 3 Thumbnail slots with per-photo validation status */}
                    <div className="flex items-center gap-3 mb-4">
                        {[0, 1, 2].map(i => {
                            const status = hasValidation ? photoValidation.statuses[i] : null;
                            const isError = status === 'error';
                            const isValid = status === 'valid';
                            return (
                                <div key={i} className="flex flex-col items-center gap-1 relative">
                                    {/* Error message above failed photo */}
                                    {isError && (
                                        <div className="absolute -top-10 left-1/2 -translate-x-1/2 whitespace-nowrap bg-red-500 text-white text-[8px] px-2 py-1 rounded-lg shadow-lg z-10 animate-bounceIn">
                                            تحتاج إعادة تصوير
                                            <div className="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-2 h-2 bg-red-500 rotate-45"></div>
                                        </div>
                                    )}
                                    <div
                                        className={`
                                            w-16 h-16 rounded-xl overflow-hidden transition-all duration-300 relative
                                            ${isError
                                                ? 'ring-2 ring-red-400 border-2 border-red-400'
                                                : isValid
                                                    ? 'ring-2 ring-sawm-emerald-400'
                                                    : photos[i]
                                                        ? 'ring-2 ring-sawm-emerald-400'
                                                        : i === nextSlot
                                                            ? 'border-2 border-dashed border-sawm-purple-400 bg-sawm-purple-50'
                                                            : 'border-2 border-dashed border-gray-200 bg-gray-50'
                                            }
                                        `}
                                        onClick={() => isError && handleReshootPhoto(i)}
                                        style={isError ? { cursor: 'pointer' } : {}}
                                    >
                                        {photos[i] ? (
                                            <>
                                                <img src={photos[i]} alt={PHOTO_LABELS[i]} className={`w-full h-full object-cover ${isError ? 'opacity-50' : ''}`} />
                                                {/* Validation overlay */}
                                                {isValid && (
                                                    <div className="absolute bottom-0.5 right-0.5 w-5 h-5 rounded-full bg-sawm-emerald-500 flex items-center justify-center shadow-sm">
                                                        <CheckIcon size={12} color="white" />
                                                    </div>
                                                )}
                                                {isError && (
                                                    <div className="absolute inset-0 bg-red-500/20 flex flex-col items-center justify-center gap-0.5">
                                                        <CloseIcon size={18} color="#ef4444" />
                                                        <span className="text-[7px] font-bold text-red-600 bg-white/80 px-1 rounded">إعادة</span>
                                                    </div>
                                                )}
                                            </>
                                        ) : (
                                            <div className="w-full h-full flex items-center justify-center">
                                                <span className={`text-lg ${i === nextSlot ? '' : 'opacity-30'}`}>
                                                    {['📱', '🔄', '📐'][i]}
                                                </span>
                                            </div>
                                        )}
                                    </div>
                                    <span className={`text-[9px] font-medium ${
                                        isError ? 'text-red-500' :
                                        isValid ? 'text-sawm-emerald-600' :
                                        photos[i] ? 'text-sawm-emerald-600' :
                                        i === nextSlot ? 'text-sawm-purple-600' : 'text-gray-300'
                                    }`}>
                                        {PHOTO_LABELS[i]}
                                    </span>

                                    {/* Reshoot button for failed photo */}
                                    {isError && (
                                        <button
                                            onClick={() => handleReshootPhoto(i)}
                                            className="mt-0.5 px-2 py-0.5 bg-red-50 border border-red-200 rounded-lg text-[8px] font-bold text-red-600 hover:bg-red-100 transition-colors flex items-center gap-0.5"
                                        >
                                            <CameraIcon size={8} color="#dc2626" />
                                            إعادة تصوير
                                        </button>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* Progress bar */}
                    <div className="w-full max-w-xs flex items-center gap-2 mb-4">
                        <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                            <div className={`h-full rounded-full transition-all duration-500 ${
                                isPartialReshoot ? 'bg-red-400' :
                                allFilled ? 'bg-sawm-emerald-500' : 'bg-sawm-purple-400'
                            }`}
                                 style={{ width: isPartialReshoot ? '66%' : `${(filledCount / 3) * 100}%` }}></div>
                        </div>
                        <span className={`text-[10px] font-bold ${
                            isPartialReshoot ? 'text-red-500' :
                            allFilled ? 'text-sawm-emerald-600' : 'text-gray-400'
                        }`}>{isPartialReshoot ? '٢/٣' : `${filledCount}/٣`}</span>
                    </div>

                    {/* Tip */}
                    <div className="w-full max-w-xs">
                        <div className={`flex items-center gap-3 rounded-2xl p-3 card-shadow ${isPartialReshoot ? 'bg-red-50' : 'bg-white'}`}>
                            <div className={`w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 ${isPartialReshoot ? 'bg-red-100' : 'bg-sawm-purple-50'}`}>
                                <span className="text-lg">{isPartialReshoot ? '📸' : '💡'}</span>
                            </div>
                            <p className={`text-xs leading-relaxed ${isPartialReshoot ? 'text-red-600' : 'text-gray-500'}`}>
                                {isPartialReshoot
                                    ? 'اضغط على الصورة المحددة بالأحمر أو زر الكاميرا لإعادة تصويرها. الصور السليمة محفوظة!'
                                    : 'خلّ الإضاءة واضحة والخلفية نظيفة عشان الـ AI يحلّل أفضل'
                                }
                            </p>
                        </div>
                    </div>

                    {/* Source Picker */}
                    {showPicker && <SourcePicker onSelect={handleSourceSelect} onClose={() => setShowPicker(false)} />}
                </div>
            );
        };

        /* ───────────── STEP 2: AI Analysis ───────────── */
        const AnalysisStep = ({ progress, currentTask, imagePreview, allPhotos = [], isValidating = false }) => {
            const tasks = isValidating ? [
                { label: 'فحص ترتيب الزوايا...', icon: '📱' },
                { label: 'التحقق من الوضوح والإضاءة...', icon: '💡' },
                { label: 'مطابقة الأجهزة...', icon: '🔄' },
                { label: 'فحص اكتمال جسم الجهاز...', icon: '📏' },
            ] : [
                { label: 'تحليل الصورة...', icon: '🔍' },
                { label: 'التعرّف على المنتج...', icon: '🤖' },
                { label: 'تقييم الحالة...', icon: '📊' },
                { label: 'حساب السعر العادل...', icon: '💰' },
            ];

            return (
                <div className="flex flex-col items-center justify-center flex-1 px-6 animate-fadeIn">
                    {/* 3 Photo thumbnails being analyzed */}
                    <div className="flex items-center gap-3 mb-8">
                        {allPhotos.length > 0 ? allPhotos.map((photo, i) => (
                            <div key={i} className={`relative w-20 h-20 rounded-2xl overflow-hidden transition-all duration-500 ${currentTask > i ? 'ring-2 ring-sawm-emerald-400' : currentTask === i ? 'ring-2 ring-sawm-purple-400 animate-float' : 'opacity-50'}`}>
                                <img src={photo} alt={`صورة ${i+1}`} className="w-full h-full object-cover" />
                                {currentTask > i && (
                                    <div className="absolute inset-0 bg-sawm-emerald-500/30 flex items-center justify-center">
                                        <div className="w-6 h-6 rounded-full bg-sawm-emerald-500 flex items-center justify-center"><CheckIcon size={12} /></div>
                                    </div>
                                )}
                                {currentTask === i && (
                                    <div className="absolute inset-0 bg-sawm-purple-500/20 flex items-center justify-center">
                                        <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                    </div>
                                )}
                            </div>
                        )) : (
                            <div className="w-20 h-20 rounded-2xl bg-sawm-purple-50 flex items-center justify-center animate-float">
                                <AIChipIcon size={36} />
                            </div>
                        )}
                    </div>

                    {/* Title */}
                    <h3 className="text-lg font-bold text-gray-900 mb-1">{isValidating ? 'جاري فحص جودة الصور...' : 'جاري تحليل الصورة بذكاء سَوم...'}</h3>
                    <p className="text-gray-400 text-xs mb-8">{isValidating ? 'نتأكد إن الصور واضحة ومتطابقة 🔍' : 'ثوانٍ بسيطة وجاهز 🚀'}</p>

                    {/* Progress bar */}
                    <div className="w-full max-w-xs mb-6">
                        <div className="flex justify-between items-center mb-2">
                            <span className="text-xs text-gray-400">التقدّم</span>
                            <span className="text-xs font-bold text-sawm-purple-600">{Math.round(progress)}%</span>
                        </div>
                        <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                            <div
                                className="h-full rounded-full progress-gradient transition-all duration-300 ease-out relative"
                                style={{ width: `${progress}%` }}
                            >
                                <div className="absolute inset-0 shimmer-bg rounded-full"></div>
                            </div>
                        </div>
                    </div>

                    {/* Task list */}
                    <div className="w-full max-w-xs space-y-2">
                        {tasks.map((task, i) => {
                            const isActive = currentTask === i;
                            const isDone = currentTask > i;
                            return (
                                <div key={i} className={`
                                    flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all duration-300
                                    ${isDone ? 'bg-sawm-emerald-50' : isActive ? 'bg-sawm-purple-50' : 'bg-gray-50'}
                                `}>
                                    <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs flex-shrink-0 transition-all duration-300 ${
                                        isDone ? 'bg-sawm-emerald-500 text-white' :
                                        isActive ? 'bg-sawm-purple-500 text-white' :
                                        'bg-gray-200 text-gray-400'
                                    }`}>
                                        {isDone ? <CheckIcon size={14} /> : task.icon}
                                    </div>
                                    <span className={`text-sm transition-all duration-300 ${
                                        isDone ? 'text-sawm-emerald-700 font-medium' :
                                        isActive ? 'text-sawm-purple-700 font-medium' :
                                        'text-gray-400'
                                    }`}>{task.label}</span>
                                    {isActive && (
                                        <div className="mr-auto flex gap-1">
                                            {[0,1,2].map(d => (
                                                <div key={d} className="w-1 h-1 rounded-full bg-sawm-purple-400 animate-bounce" style={{ animationDelay: `${d * 0.15}s` }}/>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        /* ───────────── PHOTO CAROUSEL ───────────── */
        const PhotoCarousel = ({ photos }) => {
            const [activeIdx, setActiveIdx] = useState(0);
            return (
                <div className="relative w-full h-full">
                    <img src={photos[activeIdx]} alt={`صورة ${activeIdx + 1}`} className="w-full h-full object-cover transition-opacity duration-300" />
                    {/* Dots */}
                    <div className="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5">
                        {photos.map((_, i) => (
                            <button key={i} onClick={() => setActiveIdx(i)}
                                className={`w-2 h-2 rounded-full transition-all ${i === activeIdx ? 'bg-white w-4' : 'bg-white/50'}`} />
                        ))}
                    </div>
                    {/* Arrows */}
                    {activeIdx > 0 && (
                        <button onClick={() => setActiveIdx(activeIdx - 1)} className="absolute left-2 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-black/30 text-white flex items-center justify-center text-xs hover:bg-black/50">›</button>
                    )}
                    {activeIdx < photos.length - 1 && (
                        <button onClick={() => setActiveIdx(activeIdx + 1)} className="absolute right-2 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-black/30 text-white flex items-center justify-center text-xs hover:bg-black/50">‹</button>
                    )}
                    {/* Counter */}
                    <div className="absolute top-2 left-2 bg-black/40 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">
                        {activeIdx + 1}/{photos.length}
                    </div>
                </div>
            );
        };

        /* ───────────── STEP 3: Result & Publish ───────────── */
        const ResultStep = ({ onPublish, published, aiResult, imagePreview, allPhotos = [] }) => {
            const [showCard, setShowCard] = useState(false);
            const [showBtn, setShowBtn] = useState(false);
            const [editMode, setEditMode] = useState(null); // null | 'price' | 'condition'

            const defaultProduct = {
                name: 'iPhone 15 Pro Max',
                nameAr: 'آيفون ١٥ برو ماكس',
                storage: '256GB',
                color: 'تيتانيوم أزرق',
                conditionKey: 'excellent',
                condition: 'ممتازة — مثل الجديد',
                conditionScore: 95,
                price: 3850,
                suggestedPrice: '٣,٨٥٠',
                marketRange: '٣,٥٠٠ - ٤,٢٠٠',
                edited: false,
            };

            // Map Gemini response {model, condition, price_sar, description_short} to product
            const mapCondition = (cond) => {
                if (!cond) return { key: 'good', label: 'جيدة جداً', score: 80 };
                const c = cond.toLowerCase();
                if (c.includes('ممتاز') || c.includes('excellent') || c.includes('جديد') || c.includes('new')) return { key: 'excellent', label: cond, score: 95 };
                if (c.includes('جيد') || c.includes('good')) return { key: 'good', label: cond, score: 80 };
                if (c.includes('مقبول') || c.includes('fair') || c.includes('متوسط')) return { key: 'fair', label: cond, score: 60 };
                return { key: 'good', label: cond, score: 80 };
            };

            const initialProduct = aiResult ? (() => {
                const cond = mapCondition(aiResult.condition);
                const price = aiResult.price_sar || defaultProduct.price;
                const priceLow = aiResult.market_range_low || Math.round(price * 0.9);
                const priceHigh = aiResult.market_range_high || Math.round(price * 1.1);
                return {
                    ...defaultProduct,
                    name: aiResult.model || defaultProduct.name,
                    nameAr: aiResult.model || defaultProduct.nameAr,
                    storage: aiResult.storage || '',
                    color: aiResult.color || '',
                    conditionKey: cond.key,
                    condition: cond.label,
                    conditionScore: cond.score,
                    conditionDetails: aiResult.condition_details || '',
                    price: price,
                    priceLow: priceLow,
                    priceHigh: priceHigh,
                    suggestedPrice: new Intl.NumberFormat('ar-SA').format(price),
                    marketRange: `${new Intl.NumberFormat('ar-SA').format(priceLow)} - ${new Intl.NumberFormat('ar-SA').format(priceHigh)}`,
                    descriptionShort: aiResult.marketing_description || aiResult.description_short || '',
                };
            })() : defaultProduct;

            const [productData, setProductData] = useState(initialProduct);

            useEffect(() => {
                const t1 = setTimeout(() => setShowCard(true), 200);
                const t2 = setTimeout(() => setShowBtn(true), 800);
                return () => { clearTimeout(t1); clearTimeout(t2); };
            }, []);

            const formatPriceAr = (p) => new Intl.NumberFormat('ar-SA').format(p);

            const handleSaveEdit = (changes) => {
                setProductData(prev => {
                    const updated = { ...prev, edited: true };
                    if (changes.price !== undefined) {
                        updated.price = changes.price;
                        updated.suggestedPrice = formatPriceAr(changes.price);
                    }
                    if (changes.conditionKey) {
                        updated.conditionKey = changes.conditionKey;
                        updated.condition = changes.conditionLabel;
                        updated.conditionScore = changes.conditionScore;
                    }
                    return updated;
                });
                setEditMode(null);
            };

            const product = productData;

            return (
                <div className="flex flex-col flex-1 px-5 pt-2 pb-4 overflow-y-auto relative">

                        <button onClick={onConfirm} className="flex-1 py-3 rounded-xl bg-gradient-to-l from-sawm-purple-600 to-sawm-purple-500 text-white font-bold text-sm btn-shadow hover:brightness-110 active:scale-[0.98] transition-all">

        /* ───────────── VALIDATION ERROR MODAL ───────────── */
        const ValidationErrorModal = ({ errorMessage, errorType, failedPhoto, photos, onRetry, onPartialRetry }) => {
            const errorIcons = {
                front_view: '📱',

                incomplete_body: '📏',
                lighting: '💡',
                blur: '📸',

                back_view: 'الصورة الخلفية غلط',

                blur: 'الصور مو واضحة',

            const photoLabels = ['الأمامية', 'الخلفية', 'الجوانب'];
            const icon = errorIcons[errorType] || '⚠️';
            const title = errorTitles[errorType] || 'فيه مشكلة بالصور';
            // failedPhoto: 1,2,3 = specific photo, 0 = general
            const failedIdx = (failedPhoto || 0) - 1;

            return (
                <div className="absolute inset-0 z-50 flex items-center justify-center sheet-overlay" style={{ background: 'rgba(0,0,0,0.5)' }}>
                    <div className="bg-white rounded-3xl p-6 mx-6 w-full max-w-sm animate-scaleIn">
                        {/* Error icon */}
                        <div className="text-center mb-4">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-50 mb-3 animate-bounceIn">
                                <span className="text-3xl">{icon}</span>

                        {/* Show photos with the problematic one highlighted */}
                        {photos && photos.length > 0 && (
                            <div className="flex items-center justify-center gap-2 mb-4">

                                                {isFailed && (

                                                        <CheckIcon size={10} />

                        {/* Tips */}

                            <p className="text-[11px] text-gray-500 leading-relaxed">
                                {errorType === 'front_view' && 'الصورة الأولى لازم تكون للشاشة الأمامية مباشرة. صوّر الشاشة بشكل واضح.'}
                                {errorType === 'back_view' && 'الصورة الثانية لازم تكون لظهر الجوال. اقلب الجهاز وصوّر الكاميرا والغطاء.'}
                                {errorType === 'side_view' && 'الصورة الثالثة لازم تكون للجوانب. صوّر الأطراف والأزرار والمنافذ.'}
                                {errorType === 'incomplete_body' && 'لازم الجهاز يبان كامل بالصورة من فوق لتحت. بعّد الكاميرا شوي عشان يبان كله.'}
                                {errorType === 'lighting' && 'صوّر في مكان فيه إضاءة طبيعية أو ضوء أبيض قوي. تجنّب الأماكن المظلمة.'}
                                {errorType === 'blur' && 'ثبّت يدك أو حط الجوال على سطح مستوي وصوّر من مسافة قريبة بدون حركة.'}
                                {errorType === 'mismatch' && 'تأكد إنك تصوّر نفس الجهاز بالضبط من ٣ زوايا: الأمام، الخلف، والجنب.'}
                                {!['front_view','back_view','side_view','incomplete_body','lighting','blur','mismatch'].includes(errorType) && 'حاول تصوّر الجهاز في إضاءة جيدة ومن زوايا واضحة وتظهر الجهاز كامل.'}
                            </p>
                        </div>

                        {/* Partial reshoot button (when a specific photo failed) */}
                        {failedIdx >= 0 && failedIdx <= 2 && errorType !== 'mismatch' && onPartialRetry && (
                            <button
                                onClick={onPartialRetry}
                                className="w-full py-3.5 rounded-2xl bg-gradient-to-l from-sawm-purple-600 to-sawm-purple-500 text-white font-bold text-sm btn-shadow hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mb-2"
                            >
                                <CameraIcon size={18} color="white" />

                            </button>

                        {/* Full retry button */}
                        <button
                            onClick={onRetry}
                            className={`w-full py-3.5 rounded-2xl text-sm font-bold transition-all flex items-center justify-center gap-2 ${
                                failedIdx >= 0 && failedIdx <= 2 && errorType !== 'mismatch' && onPartialRetry
                                    ? 'bg-gray-100 text-gray-600 hover:bg-gray-200 active:scale-[0.98]'
                                    : 'bg-gradient-to-l from-sawm-purple-600 to-sawm-purple-500 text-white btn-shadow hover:brightness-110 active:scale-[0.98]'
                            }`}
                        >
                            <CameraIcon size={18} color={failedIdx >= 0 && failedIdx <= 2 && errorType !== 'mismatch' && onPartialRetry ? '#4b5563' : 'white'} />
                            <span>إعادة تصوير الكل</span>
                        </button>
                    </div>
                </div>
            );
        };

        /* ───────────── API KEY MODAL ───────────── */
        const ApiKeyModal = ({ onSave, onClose }) => {
            const [key, setKey] = useState(localStorage.getItem('gemini_api_key') || '');
            return (
                <div className="absolute inset-0 z-50 flex items-center justify-center sheet-overlay" style={{ background: 'rgba(0,0,0,0.5)' }} onClick={onClose}>
                    <div className="bg-white rounded-3xl p-6 mx-6 w-full max-w-sm animate-scaleIn" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center gap-2 mb-4">
                            <AIChipIcon size={24} />
                            <h3 className="text-lg font-bold text-gray-900">مفتاح Gemini API</h3>
                        </div>
                        <p className="text-xs text-gray-400 mb-4 leading-relaxed">أدخل مفتاح Google Gemini API عشان سَوم يحلّل الصور. المفتاح يتحفظ محلياً في جهازك فقط.</p>
                        <input
                            type="password"
                            value={key}
                            onChange={e => setKey(e.target.value)}

                            className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 text-sm text-left dir-ltr focus:border-sawm-purple-400 focus:outline-none transition-colors mb-4"
                            style={{ direction: 'ltr' }}

                                إلغاء
                            </button>
                            <button
                                onClick={() => { localStorage.setItem('gemini_api_key', key); onSave(key); }}

                                className="flex-1 py-3 rounded-xl bg-gradient-to-l from-sawm-purple-600 to-sawm-purple-500 text-white font-bold text-sm btn-shadow hover:brightness-110 active:scale-[0.98] transition-all disabled:opacity-40"
                            >

        const ErrorToast = ({ message, onClose }) => (

        const InstallBanner = ({ onInstall, onClose }) => (

                    <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-sawm-purple-500 to-sawm-purple-700 flex items-center justify-center flex-shrink-0">
                        <SparkleIcon size={20} color="white" />
                    </div>
                    <div className="flex-1 min-w-0">
                        <p className="text-sm font-bold text-gray-900">أضف سوم لشاشتك الرئيسية</p>
