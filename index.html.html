                    </div>
                    <div className="flex flex-col gap-1.5 flex-shrink-0">
                        <button onClick={onInstall} className="px-4 py-1.5 rounded-xl bg-gradient-to-l from-sawm-purple-600 to-sawm-purple-500 text-white font-bold text-[11px] btn-shadow hover:brightness-110 active:scale-95 transition-all">
                            تثبيت
                        </button>
                        <button onClick={onClose} className="px-4 py-1 rounded-xl text-gray-400 font-medium text-[10px] hover:text-gray-600 transition-colors">
                            لاحقاً
                        </button>
                    </div>
                </div>
            </div>
        );

        /* ───────────── SETTINGS ICON ───────────── */
        const SettingsIcon = ({ size = 18, color = "#6b7280" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        );

        /* ───────────── MAIN APP ───────────── */
        const App = () => {
            const [step, setStep] = useState(0); // 0=capture, 1=analyzing, 2=result
            const [progress, setProgress] = useState(0);
            const [currentTask, setCurrentTask] = useState(0);
            const [published, setPublished] = useState(false);
            const [imagePreview, setImagePreview] = useState(null);
            const [allPhotos, setAllPhotos] = useState([]);
            const [aiResult, setAiResult] = useState(null);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || GEMINI_KEY);
            const [showApiKeyModal, setShowApiKeyModal] = useState(false);
            const [error, setError] = useState(null);
            const [showConfidence, setShowConfidence] = useState(false);
            const [pendingResult, setPendingResult] = useState(null);
            const [validationError, setValidationError] = useState(null); // {errorMessage, errorType}
            const [isValidating, setIsValidating] = useState(false);
            const [photoValidation, setPhotoValidation] = useState(null); // {statuses: ['valid','valid','error'], failedIndex, errorMessage, errorType}
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showInstallBanner, setShowInstallBanner] = useState(false);
            const progressRef = useRef(null);

            // Listen for PWA install prompt
            useEffect(() => {
                const dismissed = localStorage.getItem('sawm_a2hs_dismissed');
                if (dismissed) return;

                const handler = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    // Show banner after 3 seconds
                    setTimeout(() => setShowInstallBanner(true), 3000);
                };
                window.addEventListener('beforeinstallprompt', handler);

                // iOS Safari — show custom banner
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
                if (isIOS && !isStandalone && !dismissed) {
                    setTimeout(() => setShowInstallBanner(true), 3000);
                }

                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstall = useCallback(async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        setShowInstallBanner(false);
                    }
                    setDeferredPrompt(null);
                } else {
                    // iOS — show instructions
                    alert('اضغط على زر المشاركة (⬆️) في الأسفل، ثم اختر "إضافة إلى الشاشة الرئيسية"');
                }
            }, [deferredPrompt]);

            const handleDismissInstall = useCallback(() => {
                setShowInstallBanner(false);
                localStorage.setItem('sawm_a2hs_dismissed', Date.now().toString());
            }, []);

            const startProgressAnimation = useCallback(() => {
                let p = 0;
                progressRef.current = setInterval(() => {
                    p += Math.random() * 2 + 0.5;
                    if (p >= 90) p = 90; // Cap at 90%, wait for real completion
                    setProgress(p);
                    if (p < 25) setCurrentTask(0);
                    else if (p < 50) setCurrentTask(1);
                    else if (p < 75) setCurrentTask(2);
                    else setCurrentTask(3);
                }, 150);
            }, []);

            const finishProgress = useCallback(() => {
                if (progressRef.current) clearInterval(progressRef.current);
                setProgress(100);
                setCurrentTask(4);
            }, []);

            const handleCapture = useCallback(async (photosArray) => {
                // photosArray = [base64_1, base64_2, base64_3]
                setImagePreview(photosArray[0]);
                setAllPhotos(photosArray);
                setError(null);
                setValidationError(null);
                setPhotoValidation(null);

                const key = apiKey || localStorage.getItem('gemini_api_key');
                if (!key) {
                    setShowApiKeyModal(true);
                    return;
                }

                const rawImages = photosArray.map(img => img.split(',')[1]);

                // ─── STEP 1: Validation Pass ───
                setStep(1);
                setIsValidating(true);
                setProgress(0);
                setCurrentTask(0);

                // Validation progress animation (faster, 4 tasks)
                let vp = 0;
                progressRef.current = setInterval(() => {
                    vp += Math.random() * 4 + 1;
                    if (vp >= 90) vp = 90;
                    setProgress(vp);
                    if (vp < 25) setCurrentTask(0);
                    else if (vp < 50) setCurrentTask(1);
                    else if (vp < 75) setCurrentTask(2);
                    else setCurrentTask(3);
                }, 150);

                try {
                    const validation = await validateImages(rawImages, key);

                    if (progressRef.current) clearInterval(progressRef.current);
                    setProgress(100);
                    setCurrentTask(3);

                    if (!validation.isValid) {
                        // Build per-photo validation statuses
                        const failedPhoto = validation.failedPhoto || 0;
                        const failedIdx = failedPhoto - 1; // Convert 1-based to 0-based
                        const errorType = validation.errorType || 'none';

                        let statuses;
                        if (failedIdx >= 0 && failedIdx <= 2) {
                            // Specific photo failed — mark it as error, others as valid
                            statuses = ['valid', 'valid', 'valid'];
                            statuses[failedIdx] = 'error';
                        } else if (errorType === 'mismatch') {
                            // Mismatch means all photos are suspect — require full retake
                            statuses = ['error', 'error', 'error'];
                        } else {
                            // General error, mark all as error
                            statuses = ['error', 'error', 'error'];
                        }

                        const pv = {
                            statuses,
                            failedIndex: failedIdx,
                            errorMessage: validation.errorMessage || 'فيه مشكلة بالصور، حاول مرة ثانية',
                            errorType,
                        };

                        setTimeout(() => {
                            setIsValidating(false);
                            setStep(0);
                            // Keep photos! Don't clear allPhotos.
                            setPhotoValidation(pv);
                            setValidationError({
                                errorMessage: pv.errorMessage,
                                errorType: pv.errorType,
                                failedPhoto: failedPhoto,
                            });
                        }, 500);
                        return;
                    }

                    // ─── STEP 2: Analysis Pass (validation passed) ───
                    setIsValidating(false);
                    setPhotoValidation(null);
                    setProgress(0);
                    setCurrentTask(0);
                    startProgressAnimation();

                    const result = await analyzeProductImage(rawImages, key);
                    finishProgress();

                    // Check confidence score
                    if (result.confidence_score && result.confidence_score < 70) {
                        setPendingResult(result);
                        setShowConfidence(true);
                        setTimeout(() => setStep(0), 300);
                    } else {
                        setAiResult(result);
                        setTimeout(() => setStep(2), 600);
                    }
                } catch (err) {
                    if (progressRef.current) clearInterval(progressRef.current);
                    setIsValidating(false);
                    console.error('Gemini Error:', err);
                    setError(err.message || 'حصل خطأ في تحليل الصورة. تأكد من مفتاح الـ API.');
                    setStep(0);
                }
            }, [apiKey, startProgressAnimation, finishProgress]);

            const handleApiKeySave = useCallback((key) => {
                setApiKey(key);
                setShowApiKeyModal(false);
                // If we have pending photos, retry
                if (allPhotos.length === 3) {
                    handleCapture(allPhotos);
                }
            }, [allPhotos]);

            const handleConfidenceConfirm = useCallback(() => {
                setShowConfidence(false);
                setAiResult(pendingResult);
                setPendingResult(null);
                setStep(2);
            }, [pendingResult]);

            const handleConfidenceRetry = useCallback(() => {
                setShowConfidence(false);
                setPendingResult(null);
                setPhotoValidation(null);
                setAllPhotos([]);
                setStep(0);
            }, []);

            const handleValidationRetry = useCallback(() => {
                // Don't clear photos — keep valid ones for partial reshoot
                // Only clear validation error modal (inline validation stays via photoValidation)
                setValidationError(null);
                setStep(0);
            }, []);

            const handleFullRetry = useCallback(() => {
                // Full retry — clear everything
                setValidationError(null);
                setPhotoValidation(null);
                setAllPhotos([]);
                setStep(0);
            }, []);

            const handlePublish = useCallback(() => {
                setPublished(true);
            }, []);

            return (
                <div className="relative w-full max-w-[390px] mx-auto bg-white rounded-[3rem] overflow-hidden"
                     style={{ height: '844px', boxShadow: '0 25px 80px -12px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05)' }}>
                    {/* Phone frame */}
                    <div className="absolute inset-0 pointer-events-none border border-gray-200/50 rounded-[3rem] z-50"></div>

                    {/* Dynamic Island */}
                    <div className="relative z-40">
                        <div className="notch"></div>
                    </div>

                    {/* Error toast */}
                    {error && <ErrorToast message={error} onClose={() => setError(null)} />}

                    {/* Validation Error Modal */}
                    {validationError && (
                        <ValidationErrorModal
                            errorMessage={validationError.errorMessage}
                            errorType={validationError.errorType}
                            failedPhoto={validationError.failedPhoto}
                            photos={allPhotos}
                            onRetry={handleFullRetry}
                            onPartialRetry={handleValidationRetry}
                        />
                    )}

                    {/* Confidence Confirmation Modal */}
                    {showConfidence && pendingResult && (
                        <ConfidenceModal aiResult={pendingResult} onConfirm={handleConfidenceConfirm} onRetry={handleConfidenceRetry} />
                    )}

                    {/* API Key Modal */}
                    {showApiKeyModal && (
                        <ApiKeyModal onSave={handleApiKeySave} onClose={() => setShowApiKeyModal(false)} />
                    )}

                    {/* Content wrapper */}
                    <div className="flex flex-col h-full pt-2 pb-8 relative">
                        <FloatingSparkles />

                        {/* Top bar */}
                        <div className="flex items-center justify-between px-6 py-3 flex-shrink-0">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-sawm-purple-500 to-sawm-purple-700 flex items-center justify-center">
                                    <SparkleIcon size={14} color="white" />
                                </div>
                                <div>
                                    <h1 className="text-sm font-bold text-gray-900 leading-none">سَوم</h1>
                                    <span className="text-[9px] text-sawm-purple-500 font-medium">AI</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setShowApiKeyModal(true)} className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center hover:bg-gray-100 transition-colors" title="إعدادات API">
                                    <SettingsIcon size={15} color={apiKey ? '#10b981' : '#9ca3af'} />
                                </button>
                                <div className="flex items-center gap-1.5 bg-gray-50 rounded-full px-3 py-1.5">
                                    <div className={`w-1.5 h-1.5 rounded-full ${apiKey ? 'bg-sawm-emerald-500 animate-pulse' : 'bg-gray-300'}`}></div>
                                    <span className="text-[10px] text-gray-500 font-medium">إعلان سريع</span>
                                </div>
                            </div>
                        </div>

                        {/* Steps indicator */}
                        <div className="flex items-center justify-center gap-2 px-6 mb-4 flex-shrink-0">
                            {['التصوير', 'التحليل', 'النشر'].map((label, i) => (
                                <div key={i} className="flex items-center gap-2">
                                    <div className={`flex items-center gap-1.5 transition-all duration-300`}>
                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold transition-all duration-300 ${
                                            step > i ? 'bg-sawm-emerald-500 text-white' :
                                            step === i ? 'bg-sawm-purple-500 text-white' :
                                            'bg-gray-100 text-gray-400'
                                        }`}>
                                            {step > i ? <CheckIcon size={12} /> : i + 1}
                                        </div>
                                        <span className={`text-[10px] font-medium transition-all duration-300 ${
                                            step === i ? 'text-sawm-purple-600' :
                                            step > i ? 'text-sawm-emerald-600' :
                                            'text-gray-400'
                                        }`}>{label}</span>
                                    </div>
                                    {i < 2 && (
                                        <div className={`w-8 h-0.5 rounded-full transition-all duration-300 ${
                                            step > i ? 'bg-sawm-emerald-300' : 'bg-gray-100'
                                        }`}></div>
                                    )}
                                </div>
                            ))}
                        </div>

                        {/* Main content area */}
                        {step === 0 && <CaptureStep onCapture={handleCapture} initialPhotos={allPhotos.length === 3 ? allPhotos : null} photoValidation={photoValidation} />}
                        {step === 1 && <AnalysisStep progress={Math.min(progress, 100)} currentTask={currentTask} imagePreview={imagePreview} allPhotos={allPhotos} isValidating={isValidating} />}
                        {step === 2 && <ResultStep onPublish={handlePublish} published={published} aiResult={aiResult} imagePreview={imagePreview} allPhotos={allPhotos} />}

                        {/* Home indicator */}
                        <div className="flex-shrink-0 flex justify-center pt-2">
                            <div className="w-32 h-1 bg-gray-900 rounded-full opacity-20"></div>
                        </div>
                    </div>

                    {/* A2HS Install Banner */}
                    {showInstallBanner && (
                        <InstallBanner onInstall={handleInstall} onClose={handleDismissInstall} />
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((reg) => {
                        console.log('سَوم SW registered:', reg.scope);
                        // Auto-update check
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'activated') {
                                    console.log('سَوم SW updated!');
                                }
                            });
                        });
                    })
                    .catch((err) => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
