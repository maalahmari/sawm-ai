<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<h2>Right-click each image → Save As → save to /icons/ folder</h2>
<div style="display:flex;gap:20px;margin:20px;">
  <div>
    <p>icon-192.png</p>
    <canvas id="c192" width="192" height="192"></canvas>
  </div>
  <div>
    <p>icon-512.png</p>
    <canvas id="c512" width="512" height="512"></canvas>
  </div>
</div>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#8b5cf6');
  grad.addColorStop(1, '#6d28d9');
  // Rounded rect
  const r = s * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s-r, 0); ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s-r); ctx.quadraticCurveTo(s, s, s-r, s);
  ctx.lineTo(r, s); ctx.quadraticCurveTo(0, s, 0, s-r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  // Sparkle
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  const cx = s*0.5, cy = s*0.38, sp = s*0.15;
  ctx.beginPath();
  ctx.moveTo(cx, cy-sp); ctx.lineTo(cx+sp*0.25, cy-sp*0.25);
  ctx.lineTo(cx+sp, cy); ctx.lineTo(cx+sp*0.25, cy+sp*0.25);
  ctx.lineTo(cx, cy+sp); ctx.lineTo(cx-sp*0.25, cy+sp*0.25);
  ctx.lineTo(cx-sp, cy); ctx.lineTo(cx-sp*0.25, cy-sp*0.25);
  ctx.closePath();
  ctx.fill();
  // Text "سوم"
  ctx.fillStyle = 'white';
  ctx.font = `bold ${s*0.18}px Tajawal, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('سَوم', cx, s*0.68);
  // "AI" small
  ctx.font = `600 ${s*0.09}px Tajawal, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('AI', cx, s*0.82);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
// Auto-download
['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  const link = document.createElement('a');
  link.download = id === 'c192' ? 'icon-192.png' : 'icon-512.png';
  link.href = c.toDataURL('image/png');
  link.click();
});
</script>
</body>
</html>
